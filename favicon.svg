<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Circle ring -->
  <circle cx="36" cy="32" r="26" fill="none" stroke="#22c55e" stroke-width="3.5" opacity="0.6"/>
  <!-- Speed lines -->
  <line x1="4" y1="23" x2="16" y2="23" stroke="#a3e635" stroke-width="3" stroke-linecap="round"/>
  <line x1="2" y1="32" x2="14" y2="32" stroke="#a3e635" stroke-width="3" stroke-linecap="round"/>
  <line x1="4" y1="41" x2="16" y2="41" stroke="#a3e635" stroke-width="3" stroke-linecap="round"/>
  <!-- Play button background (dark circle fill) -->
  <circle cx="36" cy="32" r="22" fill="#0a1a0a"/>
  <!-- Play triangle with gradient -->
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <polygon points="28,20 50,32 28,44" fill="url(#pg)"/>
</svg>
